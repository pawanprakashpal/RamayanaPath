<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Lord Ram silhouette with bow and arrow -->
  <defs>
    <linearGradient id="saffron" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
  </defs>
  <!-- Figure of Ram standing with bow -->
  <g transform="translate(12, 4)" fill="url(#saffron)">
    <!-- Head with crown -->
    <circle cx="20" cy="8" r="5.5"/>
    <!-- Crown/mukut -->
    <path d="M16 4 L20 0 L24 4" stroke="url(#saffron)" stroke-width="1.5" fill="url(#saffron)"/>
    <path d="M17.5 4.5 L20 1.5 L22.5 4.5" fill="url(#saffron)"/>
    <!-- Neck -->
    <rect x="18.5" y="13" width="3" height="3" rx="1"/>
    <!-- Body/torso - dhoti style -->
    <path d="M14 16 L26 16 L27 35 L20 38 L13 35 Z"/>
    <!-- Left arm holding bow -->
    <path d="M14 17 L4 28 L5 29 L14 20" fill="url(#saffron)"/>
    <!-- Right arm drawing arrow -->
    <path d="M26 17 L34 22 L33 23 L26 20" fill="url(#saffron)"/>
    <!-- Bow (curved) -->
    <path d="M2 18 Q-2 28 4 38" stroke="url(#saffron)" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Bowstring -->
    <line x1="2" y1="18" x2="4" y2="38" stroke="url(#saffron)" stroke-width="1"/>
    <!-- Arrow -->
    <line x1="4" y1="28" x2="38" y2="20" stroke="url(#saffron)" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Arrowhead -->
    <path d="M38 20 L35 17 L39 19 Z" fill="url(#saffron)"/>
    <!-- Legs -->
    <path d="M16 35 L14 52 L17 52 L19 38" fill="url(#saffron)"/>
    <path d="M24 35 L26 52 L23 52 L21 38" fill="url(#saffron)"/>
    <!-- Feet -->
    <ellipse cx="15" cy="53" rx="3" ry="1.5" fill="url(#saffron)"/>
    <ellipse cx="25" cy="53" rx="3" ry="1.5" fill="url(#saffron)"/>
  </g>
</svg>
